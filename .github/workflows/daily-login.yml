name: Daily Forum Login

on:
  schedule:
    - cron: "0 1 * * *"   # 08:00 WIB (UTC+7)
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 libgbm1 libxshmfence1 libnss3 libnspr4 \
            libatk1.0-0 libatk-bridge2.0-0 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxrandr2 libpango-1.0-0

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Run login script
        env:
          FORUM_USERNAME: ${{ secrets.FORUM_USERNAME }}
          FORUM_PASSWORD: ${{ secrets.FORUM_PASSWORD }}
          FORUM_URL: ${{ secrets.FORUM_URL }}
        run: python login.py
